<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Cloud Bridge Setup</title>
    <style>
        body { background-color: #121212; color: #FFFFFF; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #181818; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #1DB954; margin-top: 0; }
        p { color: #B3B3B3; font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 8px; border: 1px solid #333; background-color: #282828; color: white; box-sizing: border-box; }
        button { background-color: #1DB954; color: black; border: none; padding: 14px; width: 100%; border-radius: 500px; font-weight: bold; font-size: 16px; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.98); }
        .hidden { display: none; }
        .spinner { border: 4px solid #333; border-top: 4px solid #1DB954; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container" id="form-ui">
    <h2>Connect to Cloud Bridge</h2>
    <p>Enter your Spotify Developer App credentials to link your profile to the car.</p>
    <input type="text" id="clientId" placeholder="Spotify Client ID" required>
    <input type="password" id="clientSecret" placeholder="Spotify Client Secret" required>
    <button onclick="startAuth()">Connect Spotify</button>
</div>

<div class="container hidden" id="loading-ui">
    <h2>Authenticating...</h2>
    <div class="spinner"></div>
    <p id="status-text">Securely linking your account.</p>
</div>

<div class="container hidden" id="success-ui">
    <h2>Success!</h2>
    <p>Your profile has been sent to the car. You can now close this window.</p>
</div>

<script>
    // --- IMPORTANT: REPLACE WITH YOUR FIREBASE DB URL ---
    const FIREBASE_DB_URL = "https://aaosspotiftycloudbridge-default-rtdb.firebaseio.com";
    const REDIRECT_URI = "https://wasidremin.github.io/AAOS_Spotify_CloudBridge/";

    const urlParams = new URLSearchParams(window.location.search);
    const authCode = urlParams.get('code');
    const sessionState = urlParams.get('state'); // We passed the session ID in the state
    const initialSession = urlParams.get('session');

    if (authCode && sessionState) {
        // Step 2: Returning from Spotify. Exchange code for tokens.
        document.getElementById('form-ui').classList.add('hidden');
        document.getElementById('loading-ui').classList.remove('hidden');
        exchangeTokenAndSendToCar(authCode, sessionState);
    } else if (!initialSession) {
        document.getElementById('form-ui').innerHTML = "<h2>Invalid Link</h2><p>Please scan the QR code on your car screen again.</p>";
    }

    function startAuth() {
        const clientId = document.getElementById('clientId').value.trim();
        const clientSecret = document.getElementById('clientSecret').value.trim();
        if (!clientId || !clientSecret) return alert("Please enter both ID and Secret.");

        // Save credentials temporarily to survive the redirect
        sessionStorage.setItem('temp_client_id', clientId);
        sessionStorage.setItem('temp_client_secret', clientSecret);

        const scopes = "user-library-read user-library-modify user-read-playback-state user-modify-playback-state user-read-currently-playing user-read-recently-played user-top-read playlist-read-private";
        
        // We pass the car's session code in the 'state' parameter so Spotify hands it right back to us
        const authUrl = `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scopes)}&state=${initialSession}`;
        window.location.href = authUrl;
    }

    async function exchangeTokenAndSendToCar(code, sessionCode) {
        const clientId = sessionStorage.getItem('temp_client_id');
        const clientSecret = sessionStorage.getItem('temp_client_secret');
        sessionStorage.clear(); // Clean up

        if (!clientId || !clientSecret) {
            document.getElementById('status-text').innerText = "Session lost. Please scan the QR code again.";
            return;
        }

        try {
            document.getElementById('status-text').innerText = "Generating tokens...";
            const authHeader = btoa(`${clientId}:${clientSecret}`);
            
            // We use a public CORS proxy because Spotify blocks token requests directly from browsers
            const tokenResponse = await fetch(`https://corsproxy.io/?https://accounts.spotify.com/api/token`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Authorization': `Basic ${authHeader}`
                },
                body: `grant_type=authorization_code&code=${code}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
            });

            const tokenData = await tokenResponse.json();
            if (!tokenData.refresh_token) throw new Error("Failed to get refresh token");

            document.getElementById('status-text').innerText = "Fetching your profile...";
            const profileResponse = await fetch(`https://api.spotify.com/v1/me`, {
                headers: { 'Authorization': `Bearer ${tokenData.access_token}` }
            });
            const profileData = await profileResponse.json();

            document.getElementById('status-text').innerText = "Sending to car...";
            const payload = {
                clientId: clientId,
                clientSecret: clientSecret,
                refreshToken: tokenData.refresh_token,
                profileName: profileData.display_name || "Spotify User",
                profileImageUrl: (profileData.images && profileData.images.length > 0) ? profileData.images[0].url : null
            };

            // Drop the payload into Firebase where the car is waiting for it
            await fetch(`${FIREBASE_DB_URL}/sessions/${sessionCode}.json`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });

            document.getElementById('loading-ui').classList.add('hidden');
            document.getElementById('success-ui').classList.remove('hidden');

        } catch (e) {
            document.getElementById('status-text').innerText = "Error: " + e.message;
        }
    }
</script>
</body>
</html>
